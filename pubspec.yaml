name: dhikir_app
description: A daily dhikir tracker app with 30-day tracking

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  google_fonts: ^6.1.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  adhan_dart: ^2.0.1
  hijri: ^3.0.1
  geolocator: ^14.0.3
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  flutter_timezone: ^4.1.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/audio/athan.mp3
